
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  .candy-root {
    font-family: 'Nunito', sans-serif;
    min-height: 520px;
    background: linear-gradient(135deg, #ffd6e7 0%, #e8d5f5 35%, #d5f0e8 70%, #fff9c4 100%);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .candy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .candy-float {
    position: absolute;
    font-size: 22px;
    animation: floatUp linear infinite;
    opacity: 0.7;
    user-select: none;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 0.7; }
    50%  { opacity: 0.9; }
    100% { transform: translateY(-600px) rotate(360deg); opacity: 0; }
  }

  .chat-card {
    width: 100%;
    max-width: 440px;
    background: rgba(255,255,255,0.82);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(180,120,200,0.18), 0 2px 8px rgba(255,180,220,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 2;
    border: 2px solid rgba(255,200,230,0.5);
    min-height: 440px;
    max-height: 480px;
  }

  .chat-header {
    background: linear-gradient(90deg, #f9a8d4 0%, #c4b5fd 60%, #86efac 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .bot-avatar {
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border: 2px solid rgba(255,255,255,0.7);
    flex-shrink: 0;
  }

  .header-text h2 {
    margin: 0;
    font-size: 17px;
    font-weight: 800;
    color: #6d28d9;
  }

  .header-text p {
    margin: 0;
    font-size: 11px;
    color: #7c3aed;
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: #34d399;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: #e9d5ff transparent;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 8px;
    animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot  { justify-content: flex-start; }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .bubble.user {
    background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
    color: #4c1d95;
    border-bottom-right-radius: 4px;
    font-weight: 600;
  }

  .bubble.bot {
    background: linear-gradient(135deg, #d1fae5, #bfdbfe);
    color: #065f46;
    border-bottom-left-radius: 4px;
    font-weight: 600;
    border: 1.5px solid rgba(167,243,208,0.6);
  }

  .mini-avatar {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #fde68a, #f9a8d4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
    border: 1.5px solid rgba(255,200,230,0.6);
  }

  .typing-bubble {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 16px;
  }

  .typing-bubble span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a78bfa;
    animation: typingDot 1.2s infinite;
    display: inline-block;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30%            { transform: translateY(-5px); opacity: 1; }
  }

  .input-row {
    padding: 12px 14px;
    background: rgba(255,255,255,0.7);
    border-top: 1.5px solid rgba(230,200,255,0.4);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    border: 1.5px solid #e9d5ff;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: #4c1d95;
    background: rgba(255,255,255,0.9);
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }

  .chat-input::placeholder { color: #c4b5fd; }
  .chat-input:focus { border-color: #a78bfa; }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover  { transform: scale(1.1); }
  .send-btn:active { transform: scale(0.95); opacity: 0.8; }
</style>

<div class="candy-root" id="root">
  <div class="candy-bg" id="candyBg"></div>

  <div class="chat-card">
    <div class="chat-header">
      <div class="bot-avatar">🍭</div>
      <div class="header-text">
        <h2>CandyBot</h2>
        <p><span class="status-dot"></span>Online & Sweet</p>
      </div>
    </div>

    <div class="messages-area" id="msgs">
      <div class="msg-row bot">
        <div class="mini-avatar">🍬</div>
        <div class="bubble bot">Hey there! I'm CandyBot 🍭 Welcome to Candyland! What's on your mind?</div>
      </div>
    </div>

    <div class="input-row">
      <input class="chat-input" id="inp" placeholder="Type a sweet message..." autocomplete="off" />
      <button class="send-btn" id="sendBtn" title="Send">🍬</button>
    </div>
  </div>
</div>

<script>
(function() {
  const candyEmoji = ['🍬','🍭','🍫','🍰','🧁','🍩','🍪','🎂','🍡','🍮','🧇','🌈','✨','🎀','💝','🍓','🍇','🍑'];
  const bg = document.getElementById('candyBg');

  function spawnCandy() {
    const el = document.createElement('div');
    el.className = 'candy-float';
    el.textContent = candyEmoji[Math.floor(Math.random() * candyEmoji.length)];
    const left = Math.random() * 95;
    const dur  = 5 + Math.random() * 8;
    const delay= Math.random() * 4;
    const size = 14 + Math.random() * 16;
    el.style.cssText = `left:${left}%;bottom:-40px;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s`;
    bg.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000);
  }

  for (let i = 0; i < 10; i++) spawnCandy();
  setInterval(spawnCandy, 1200);

  const botReplies = [
    "That sounds sweet! 🍬",
    "Welcome to Candyland! 🏰",
    "I'm your CandyBot assistant 🍭",
    "Oh how delightful! 🧁",
    "Everything is sweeter here! 🍰",
    "You're making me melt! 🍫",
    "Sprinkling some magic on that! ✨",
    "That's the sweetest thing I've heard! 🍓",
    "Life is short — eat the candy! 🍩",
    "You have great taste! 🌈",
  ];

  let replyIndex = 0;

  const msgs   = document.getElementById('msgs');
  const inp    = document.getElementById('inp');
  const sendBtn= document.getElementById('sendBtn');

  function scrollDown() {
    setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 30);
  }

  function addMsg(text, who) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + who;
    if (who === 'bot') {
      row.innerHTML = '<div class="mini-avatar">🍬</div><div class="bubble bot">' + escHtml(text) + '</div>';
    } else {
      row.innerHTML = '<div class="bubble user">' + escHtml(text) + '</div>';
    }
    msgs.appendChild(row);
    scrollDown();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing';
    row.innerHTML = '<div class="mini-avatar">🍬</div><div class="bubble bot"><div class="typing-bubble"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(row);
    scrollDown();
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function send() {
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    addMsg(text, 'user');
    showTyping();
    const reply = botReplies[replyIndex % botReplies.length];
    replyIndex++;
    setTimeout(() => {
      hideTyping();
      addMsg(reply, 'bot');
    }, 800 + Math.random() * 600);
  }

  sendBtn.addEventListener('click', send);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
})();
</script>
